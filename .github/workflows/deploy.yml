name: CI + GitHub Pages redirect

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Syntax check ────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check all Python files parse
        run: |
          python -c "
          import ast, pathlib, sys
          errors = []
          for p in pathlib.Path('.').rglob('*.py'):
              try:
                  ast.parse(p.read_text())
              except SyntaxError as e:
                  errors.append(f'{p}: {e}')
          if errors:
              print('\n'.join(errors)); sys.exit(1)
          print(f'✓ {len(list(pathlib.Path(\".\").rglob(\"*.py\")))} files OK')
          "

  # ── GitHub Pages redirect → Streamlit Cloud app ─────────────────────────
  pages:
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build redirect site
        run: |
          mkdir -p _site
          cp .github/redirect/index.html _site/index.html
          cp .github/redirect/index.html _site/404.html
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
